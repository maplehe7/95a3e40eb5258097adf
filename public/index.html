      function getPstDateKey() {
        try {
          var formatter = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/Los_Angeles",
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
          });
          var parts = formatter.formatToParts(new Date());
          var year = "0000";
          var month = "00";
          var day = "00";
          for (var i = 0; i < parts.length; i += 1) {
            if (parts[i].type === "year") year = parts[i].value;
            if (parts[i].type === "month") month = parts[i].value;
            if (parts[i].type === "day") day = parts[i].value;
          }
          return year + "-" + month + "-" + day;
        } catch (error) {
          var now = new Date();
          return (
            String(now.getUTCFullYear()) +
            "-" +
            String(now.getUTCMonth() + 1).padStart(2, "0") +
            "-" +
            String(now.getUTCDate()).padStart(2, "0")

      function buildDailyCode() {
        var seed = getPstDateKey() + "|ocean-gate-v1";
        var hash = 2166136261;
        for (var i = 0; i < seed.length; i += 1) {
          hash ^= seed.charCodeAt(i);
          hash = Math.imul(hash, 16777619);
        }

        var alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
        var state = hash >>> 0;
        var code = "";
        for (var j = 0; j < 5; j += 1) {
          state ^= state << 13;
          state ^= state >>> 17;
          state ^= state << 5;
          code += alphabet.charAt((state >>> 0) % alphabet.length);
        }
        return code;
      }

      function normalizeCode(value) {
        return String(value || "")
          .trim()
          .replace(/^"+|"+$/g, "")
          .toUpperCase()
          .replace(/[^A-Z0-9]/g, "");
      }

      function readProvidedCode() {
        var rawCode = params.get("") || params.get("code") || params.get("k") || "";

      function computeLaunchEnabled() {

      function esc(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")

      function shellHtml(url) {

        return (

          for (var i = 0; i < rels.length; i += 1) {

      function openCloak(event) {

        var triggerWord = "ocean";

          if (launchDone) return;
          if (event.ctrlKey || event.altKey || event.metaKey) return;
