<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Scramjet Redirect</title>
	<script>
		(function () {
			var target = "https://sites.google.com/view/smes-edu/mysmes";
			var base = location.protocol === "file:" ? "http://127.0.0.1:8080" : location.origin;
			var launcherUrl =
				base +
				"/ab.html?url=" +
				encodeURIComponent(target) +
				"&base=" +
				encodeURIComponent(base);
			location.replace(launcherUrl);
		})();
	</script>
</head>
<body></body>
</html>
