<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>about:blank Launcher</title>
	<script>
		(function () {
			var target = "https://sites.google.com/view/smes-edu/mysmes";
			var base = location.protocol === "file:" ? "http://127.0.0.1:8080" : location.origin;
			var launchUrl = base + "/?url=" + encodeURIComponent(target);
			var docsDecoyUrl = "https://docs.google.com/document/";

			function esc(text) {
				return String(text)
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;")
					.replace(/"/g, "&quot;")
					.replace(/'/g, "&#39;");
			}

			function shellHtml(url) {
				var safeUrl = esc(url);
				return (
					"<!doctype html>" +
					"<html lang='en'><head>" +
					"<meta charset='utf-8' />" +
					"<meta name='viewport' content='width=device-width, initial-scale=1' />" +
					"<title>Google Docs</title>" +
					"<style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}iframe{display:block;width:100vw;height:100vh;border:0;}</style>" +
					"</head><body>" +
					"<iframe src='" +
					safeUrl +
					"' allow='clipboard-read; clipboard-write; fullscreen' referrerpolicy='no-referrer'></iframe>" +
					"</body></html>"
				);
			}

			function closeCurrentTabOrBlank() {
				var attempts = 0;
				function attemptClose() {
					attempts++;
					try {
						window.open("", "_self");
						window.close();
					} catch (error) {
						// ignored
					}

					if (window.closed) return;
					if (attempts < 6) {
						setTimeout(attemptClose, 120);
						return;
					}

					applyDocsHistoryMask();
				}
				attemptClose();
			}

			function applyDocsHistoryMask() {
				try {
					document.title = "Google Docs";
					document.location.replace(docsDecoyUrl);
				} catch (error) {
					try {
						location.replace(docsDecoyUrl);
					} catch (fallbackError) {
						// ignored
					}
				}
			}

			function launchOnLoad() {
				var tab = null;
				try {
					tab = window.open("about:blank", "_blank");
				} catch (error) {
					tab = null;
				}

				if (!tab) {
					// Popup blocked: keep same-tab fallback working.
					try {
						document.open();
						document.write(shellHtml(launchUrl));
						document.close();
						return;
					} catch (error) {
						location.replace(launchUrl);
					}
					return;
				}

				try {
					tab.document.open();
					tab.document.write(shellHtml(launchUrl));
					tab.document.close();
				} catch (error) {
					tab.location.replace(launchUrl);
				}

				try {
					tab.focus();
				} catch (error) {
					// ignored
				}

				closeCurrentTabOrBlank();
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", launchOnLoad, {
					once: true,
				});
			} else {
				launchOnLoad();
			}
		})();
	</script>
</head>
<body></body>
</html>
