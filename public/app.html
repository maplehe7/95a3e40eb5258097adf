<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Google Docs</title>
  <link rel="icon" href="/decoy-docs.ico" />
  <link rel="shortcut icon" href="/decoy-docs.ico" />
<script>
	(function () {
		var params = new URLSearchParams(location.search);
		var decoyTitle = params.get("dt");
		var decoyFavicon = params.get("df");
		var panicUrl = params.get("dp");
		try {
			if (decoyTitle) {
				document.title = decoyTitle;
			}
			if (decoyFavicon) {
				var rels = ["icon", "shortcut icon"];
				for (var i = 0; i < rels.length; i += 1) {
					var rel = rels[i];
					var link = document.querySelector("link[rel='" + rel + "']");
					if (!link) {
						link = document.createElement("link");
						link.setAttribute("rel", rel);
						document.head.appendChild(link);
					}
					link.setAttribute("href", decoyFavicon);
				}
			}

			if (panicUrl) {
				function whiteThenGo(url) {
					var navWin = window.top || window;
					try {
						var d = navWin.document;
						d.documentElement.style.background = "#fff";
						if (d.body) {
							d.body.style.background = "#fff";
						}
						var cover = d.getElementById("__panic_white__");
						if (!cover) {
							cover = d.createElement("div");
							cover.id = "__panic_white__";
							cover.style.cssText =
								"position:fixed;inset:0;background:#fff;z-index:2147483647;";
							d.documentElement.appendChild(cover);
						}
					} catch (error) {
						// ignored
					}
					setTimeout(function () {
						try {
							navWin.location.replace(url);
						} catch (error) {
							location.replace(url);
						}
					}, 20);
				}

				window.addEventListener(
					"keydown",
					function (event) {
						if (!event) return;
						if (event.key !== "\\" && event.code !== "Backslash") return;
						event.preventDefault();
						event.stopPropagation();
						whiteThenGo(panicUrl);
					},
					true
				);
			}
		} catch (error) {
			// ignored
		}
	})();
</script>
<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>

		</div>
		<div class="flex-center desc left-margin">
			<p>
				Scramjet is an experimental interception based web proxy designed to
				evade internet censorship, bypass arbitrary web browser restrictions and
				innovate web proxy technologies.
			</p>
		</div>

		<form id="sj-form" class="flex-center">
			<input
				id="sj-search-engine"
				value="https://www.google.com/search?q=%s"
				type="hidden"
			/>
			<input id="sj-address" type="text" placeholder="Search the web freely" />
		</form>
