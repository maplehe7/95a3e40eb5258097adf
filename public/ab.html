<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>about:blank</title>
	<script>
		(function () {
			var DEFAULT_TARGET = "https://sites.google.com/view/smes-edu/mysmes";
			var params = new URLSearchParams(location.search);
			var target = params.get("url") || params.get("target") || DEFAULT_TARGET;
			var forcedBase = params.get("base");
			var base = forcedBase || (location.protocol === "file:" ? "http://127.0.0.1:8080" : location.origin);
			var launchUrl = base + "/?url=" + encodeURIComponent(target);
			var docsMaskPath = "/docs/document/d/1R4NDoMdoCsHiStOrYeNtRy/edit";

			function esc(text) {
				return String(text)
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;")
					.replace(/"/g, "&quot;")
					.replace(/'/g, "&#39;");
			}

			function shellHtml(url) {
				var safeUrl = esc(url);
				return (
					"<!doctype html>" +
					"<html lang='en'><head>" +
					"<meta charset='utf-8' />" +
					"<meta name='viewport' content='width=device-width, initial-scale=1' />" +
					"<title>about:blank</title>" +
					"<style>" +
					"html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}" +
					"iframe{display:block;width:100vw;height:100vh;border:0;}" +
					"</style>" +
					"</head><body>" +
					"<iframe id='app' src='" +
					safeUrl +
					"' allow='clipboard-read; clipboard-write; fullscreen' referrerpolicy='no-referrer'></iframe>" +
					"<script>" +
					"try{document.title='Google Docs';history.replaceState(null,'Google Docs','" +
					docsMaskPath +
					"');}catch(e){}" +
					"setTimeout(function(){var f=document.getElementById('app');if(!f||!f.getAttribute('src')){location.replace('" +
					safeUrl +
					"');}},600);" +
					"<\/script>" +
					"</body></html>"
				);
			}

			function applyDocsHistoryMask() {
				try {
					document.title = "Google Docs";
					history.replaceState(null, "Google Docs", docsMaskPath);
				} catch (error) {
					// ignored
				}
			}

			function renderShell() {
				try {
					applyDocsHistoryMask();
					document.open();
					document.write(shellHtml(launchUrl));
					document.close();
				} catch (error) {
					location.replace(launchUrl);
				}
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", renderShell, {
					once: true,
				});
				return;
			}
			renderShell();
		})();
	</script>
</head>
<body></body>
</html>
