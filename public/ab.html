<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>Google Docs</title>
<script>
		(function () {
			var DEFAULT_TARGET = "https://sites.google.com/view/ywp3bgruywfszgtuywxrd2ruywxrzg/mysmes";
			var params = new URLSearchParams(location.search);
			var target = params.get("url") || params.get("target") || DEFAULT_TARGET;
			var forcedBase = params.get("base");
			var base = forcedBase || (location.protocol === "file:" ? "http://127.0.0.1:8080" : location.origin);
			var launchUrl = base + "/?url=" + encodeURIComponent(target);
			var docsDecoyUrl = "https://docs.google.com/document/";
			var docsFavicon = "https://ssl.gstatic.com/docs/documents/images/kix-favicon7.ico";

			function esc(text) {
				return String(text)
					.replace(/&/g, "&amp;")
					.replace(/</g, "&lt;")
					.replace(/>/g, "&gt;")
					.replace(/"/g, "&quot;")
					.replace(/'/g, "&#39;");
			}

			function shellHtml(url) {
				var safeUrl = esc(url);
				return (
					"<!doctype html>" +
					"<html lang='en'><head>" +
					"<meta charset='utf-8' />" +
					"<meta name='viewport' content='width=device-width, initial-scale=1' />" +
					"<title>Google Docs</title>" +
					"<link rel='icon' type='image/x-icon' href='" +
					esc(docsFavicon) +
					"' />" +
					"<link rel='shortcut icon' type='image/x-icon' href='" +
					esc(docsFavicon) +
					"' />" +
					"<style>" +
					"html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#0a0a0a;}" +
					"iframe{display:block;width:100vw;height:100vh;border:0;}" +
					"</style>" +
					"</head><body>" +
					"<iframe id='app' src='" +
					safeUrl +
					"' allow='clipboard-read; clipboard-write; fullscreen' referrerpolicy='no-referrer'></iframe>" +
					"<script>" +
					"try{document.title='Google Docs';}catch(e){}" +
					"setTimeout(function(){var f=document.getElementById('app');if(!f||!f.getAttribute('src')){location.replace('" +
					safeUrl +
					"');}},600);" +
					"<\/script>" +
					"</body></html>"
				);
			}

			function applyDocsFavicon(doc) {
				try {
					var d = doc || document;
					var rels = ["icon", "shortcut icon"];
					for (var i = 0; i < rels.length; i++) {
						var rel = rels[i];
						var link = d.querySelector("link[rel='" + rel + "']");
						if (!link) {
							link = d.createElement("link");
							link.setAttribute("rel", rel);
							d.head.appendChild(link);
						}
						link.setAttribute("type", "image/x-icon");
						link.setAttribute("href", docsFavicon);
					}
				} catch (error) {
					// ignored
				}
			}

			function replaceWithDocs() {
				try {
					document.title = "Google Docs";
					applyDocsFavicon(document);
					document.location.replace(docsDecoyUrl);
				} catch (error) {
					try {
						location.replace(docsDecoyUrl);
					} catch (fallbackError) {
						// ignored
					}
				}
			}

			function renderShell() {
				try {
					document.open();
					document.write(shellHtml(launchUrl));
					document.close();
					applyDocsFavicon(document);
				} catch (error) {
					location.replace(launchUrl);
				}
			}

			function launchInNewTabThenReplace() {
				applyDocsFavicon(document);
				var tab = null;
				try {
					tab = window.open("about:blank", "_blank");
				} catch (error) {
					tab = null;
				}

				if (!tab) {
					renderShell();
					return;
				}

				try {
					tab.document.open();
					tab.document.write(shellHtml(launchUrl));
					tab.document.close();
					applyDocsFavicon(tab.document);
				} catch (error) {
					tab.location.replace(launchUrl);
				}

				try {
					tab.focus();
				} catch (error) {
					// ignored
				}

				replaceWithDocs();
			}

			if (document.readyState === "loading") {
				document.addEventListener("DOMContentLoaded", launchInNewTabThenReplace, {
					once: true,
				});
				return;
			}
			launchInNewTabThenReplace();
		})();
	</script>
</head>
<body></body>
</html>
