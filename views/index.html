<!DOCTYPE html>
<html lang="en">
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="version" content="{{version}}" />
    {{ifSEO}}{{
    <meta name="googlebot" content="index, follow, snippet" />
    <meta
      name="robots"
      content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1"
    />
    <meta name="author" content="Titanium Network" />
    <meta name="generator" content="Fastify, HTML5" />
    <meta name="application-name" content="Turbo" />
    }}
    <title>{{mask}}{{Turbo | Powered by HU}}</title>
    {{ifSEO}}{{
    <meta
      name="description"
      content="Turbo is a minimal web proxy homepage powered by HU with fast shortcuts to browsing and apps."
    />
    <meta
      name="keywords"
      content="Turbo, web proxy, browser, games, YouTube, apps"
    />
    }}
    <meta property="og:image" content="{{route}}{{assets/img/hero.webp}}" />
    <meta
      property="og:image:secure_url"
      content="{{route}}{{assets/img/hero.webp}}"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--HEAD-CONTENT-->
    <script
      src="https://unpkg.com/tsparticles@3.8.1/tsparticles.bundle.min.js"
      defer
      data-module
    ></script>
    {{inline}}{{
    <script src="{{route}}{{assets/js/csel.js}}{{inline}}" defer></script>
    <script src="{{route}}{{assets/js/common.js}}{{inline}}" defer></script>
    }}
    <link rel="manifest" href="{{route}}{{manifest.json}}" />
    <style>
      .turbo-home-shell {
        position: relative;
        z-index: 1;
        max-width: 980px;
        margin: 84px auto 120px auto;
        padding: 0 20px;
        text-align: center;
      }

      .turbo-home-logo {
        width: 130px;
        height: 130px;
        margin: 0 auto 16px auto;
      }

      .turbo-title {
        margin: 0;
        font-size: clamp(42px, 8vw, 64px);
        line-height: 1;
      }

      .turbo-powered {
        margin: 10px 0 36px 0;
        color: var(--nord16);
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .turbo-quick-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 14px;
      }

      .turbo-quick-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        padding: 22px 14px;
        border-radius: 16px;
        border: 1px solid #4c566a66;
        background: var(--hero-grid-bg, var(--fancy-dark));
        color: var(--nord4);
        text-decoration: none;
        transition:
          transform 0.16s ease,
          border-color 0.16s ease,
          background-color 0.16s ease;
      }

      .turbo-quick-card i {
        font-size: 28px;
        color: var(--nord8);
      }

      .turbo-quick-card span {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .turbo-quick-card:hover,
      .turbo-quick-card:focus-visible {
        transform: translateY(-3px);
        border-color: var(--nord8);
        background-color: #4c566a33;
      }

      @media (max-width: 980px) {
        .turbo-quick-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 640px) {
        .turbo-home-shell {
          margin-top: 64px;
        }

        .turbo-home-logo {
          width: 108px;
          height: 108px;
        }

        .turbo-powered {
          margin-bottom: 26px;
        }

        .turbo-quick-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .turbo-quick-card {
          padding: 18px 10px;
        }
      }
    </style>
  </head>

  <body>
    <!-- IMPORTANT-HUCOOKINGINSERT-DONOTDELETE -->
    <!--ANTI-EXFIL-->
    <div
      id="header"
      class="fullwidth"
      role="navigation"
      aria-label="Main navigation"
    >
      <!--HEADER-->
    </div>
    <div id="banner" class="fullwidth">
      <p class="text-center">{{mask}}{{Turbo // Powered by HU}}</p>
    </div>
    <div id="mainbody" class="fullwidth">
      <div id="background" class="fullwidth"></div>
      <section class="turbo-home-shell">
        <div
          class="logo turbo-home-logo"
          role="img"
          aria-label="{{mask}}{{Turbo logo}}"
        ></div>
        <h1 class="turbo-title">{{mask}}{{Turbo}}</h1>
        <p class="turbo-powered">{{mask}}{{Powered by HU}}</p>
        <div class="turbo-quick-grid" role="navigation" aria-label="Quick Links">
          <a
            class="turbo-quick-card"
            href="{{route}}{{/browsing}}"
            aria-label="{{mask}}{{Open Browser}}"
          >
            <i class="fas fa-globe-americas" aria-hidden="true"></i>
            <span>{{mask}}{{Browser}}</span>
          </a>
          <a
            class="turbo-quick-card"
            href="{{route}}{{/beta-browser}}"
            aria-label="{{mask}}{{Open Beta Browser}}"
          >
            <i class="fab fa-chrome" aria-hidden="true"></i>
            <span>{{mask}}{{Beta Browser}}</span>
          </a>
          <a
            class="turbo-quick-card"
            href="{{route}}{{/games}}"
            aria-label="{{mask}}{{Open Games}}"
          >
            <i class="fas fa-gamepad" aria-hidden="true"></i>
            <span>{{mask}}{{Games}}</span>
          </a>
          <a
            class="turbo-quick-card"
            href="{{route}}{{/youtube}}"
            aria-label="{{mask}}{{Open YouTube}}"
          >
            <i class="fab fa-youtube" aria-hidden="true"></i>
            <span>{{mask}}{{YouTube}}</span>
          </a>
          <a
            class="turbo-quick-card"
            href="{{route}}{{/apps}}"
            aria-label="{{mask}}{{Open Apps}}"
          >
            <i class="fas fa-th-large" aria-hidden="true"></i>
            <span>{{mask}}{{Apps}}</span>
          </a>
          <a
            id="turbo-open-settings"
            class="turbo-quick-card"
            href="#header"
            aria-label="{{mask}}{{Open Settings}}"
          >
            <i class="fas fa-cog" aria-hidden="true"></i>
            <span>{{mask}}{{Settings}}</span>
          </a>
        </div>
      </section>
    </div>
    <div id="footer" class="fullwidth">
      <!--FOOTER-->
    </div>
    <script>
      (() => {
        const settingsShortcut = document.getElementById('turbo-open-settings');
        settingsShortcut?.addEventListener('click', (event) => {
          event.preventDefault();
          const settingsButton = document.querySelector('.smenu a');
          if (!settingsButton) return;
          settingsButton.focus();
        });
      })();
    </script>
  </body>
</html>
